name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "frontend/siat_web/**"
      - ".github/workflows/deploy-frontend-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/siat_web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          test -n "${{ vars.SIAT_API_BASE_URL }}"
          test -n "${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Bootstrap missing Flutter files
        run: flutter create --platforms=web --project-name siat_web .

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Flutter web
        run: flutter build web --release --dart-define=SIAT_API_BASE_URL=${{ vars.SIAT_API_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend/siat_web
          command: pages deploy build/web --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ github.ref_name }}

      - name: Print deployment URL
        if: steps.deploy.outputs.deployment-url != ''
        run: echo "${{ steps.deploy.outputs.deployment-url }}"
