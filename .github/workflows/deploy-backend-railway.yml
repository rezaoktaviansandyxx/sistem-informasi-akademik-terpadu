name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - "backend/siat_api/**"
      - ".github/workflows/deploy-backend-railway.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/siat_api
    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          test -n "${{ secrets.RAILWAY_TOKEN }}"
          test -n "${{ vars.RAILWAY_PROJECT_ID }}"
          test -n "${{ vars.RAILWAY_ENVIRONMENT_NAME }}"
          test -n "${{ vars.RAILWAY_SERVICE_NAME }}"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install frontend build dependencies
        run: npm install

      - name: Build Vite assets
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_SERVICE_NAME }}" --environment "${{ vars.RAILWAY_ENVIRONMENT_NAME }}" --project "${{ vars.RAILWAY_PROJECT_ID }}" --ci
